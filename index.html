<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A little surprise 🌷</title>

<style>
body{
    margin:0;
    background:#fffaf6;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#444;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fade 1.2s ease;
    padding:20px;
}

.flower{
    font-size:60px;
    animation:bounce 2s infinite;
}

.text{
    margin-top:18px;
    font-size:22px;
}

.sub{
    margin-top:10px;
    font-size:15px;
    opacity:.7;
}

button{
    margin-top:20px;
    padding:12px 26px;
    border:none;
    border-radius:30px;
    background:#ff8fab;
    color:white;
    font-size:16px;
    font-family:inherit;
    cursor:pointer;
    transition:.25s ease;
    box-shadow:0 8px 18px rgba(255,143,171,.25);
}

button:hover{
    transform:translateY(-2px) scale(1.04);
    background:#ff7396;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">

<div class="flower">🌷</div>

<div class="text">
A little surprise awaits...
</div>

<div class="sub" id="status">
Just a second 🌿
</div>

</div>

<script>

const destination = "https://egreet.in/bouquet/831066e9-a5de-4a60-ab37-748db9ec7204";

setTimeout(() => {

    document.getElementById("status").innerHTML = 
        <button id="open">🌷 Open your bouquet</button>
    ;

    document.getElementById("open").addEventListener("click", () => {
        window.location.href = destination;
    });

}, 3000);

</script>

</body>
</html>
