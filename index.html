<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A little surprise 🌷</title>

<style>
body{
    margin:0;
    background:#fffaf6;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#444;
    overflow:hidden;
}

.container{
    text-align:center;
}

.flower{
    font-size:64px;
    animation:bounce 2s infinite;
}

.text{
    margin-top:18px;
    font-size:22px;
}

.sub{
    margin-top:10px;
    font-size:15px;
    opacity:.65;
}

.loader{
    width:180px;
    height:4px;
    background:#eee;
    margin:30px auto 0;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#d86d7b;
    animation:load 3s linear forwards;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>

<body>

<div class="container">

<div class="flower">🌷</div>

<div class="text">
A little surprise awaits...
</div>

<div class="sub">
Just a second 🌿
</div>

<div class="loader">
    <div class="bar"></div>
</div>

</div>

<script>
const destination = "https://egreet.in/bouquet/831066e9-a5de-4a60-ab37-748db9ec7204";

setTimeout(() => {
    window.location.href = destination;
}, 3000);
</script>

</body>
</html>
