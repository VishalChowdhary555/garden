<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A little surprise 🌷</title>

<style>
body{
    margin:0;
    background:#fffaf6;
    font-family:Georgia, serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#444;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fade 1.2s ease;
}

.flower{
    font-size:60px;
    animation:bounce 2s infinite;
}

.text{
    margin-top:18px;
    font-size:22px;
}

.sub{
    margin-top:10px;
    font-size:15px;
    opacity:.65;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">

<div class="flower">🌷</div>

<div class="text">
A little surprise awaits...
</div>

<div class="sub">
Just a second 🌿
</div>

</div>

<script>

// Replace this with your egreet link
const destination = "https://egreet.in/bouquet/831066e9-a5de-4a60-ab37-748db9ec7204";

setTimeout(()=>{
    window.location.replace(destination);
},3000);

</script>

</body>
</html>
